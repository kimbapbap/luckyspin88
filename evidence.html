<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuckySpin88 - Evidence Analysis</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:#00ff88;
    font-family:'Share Tech Mono', monospace;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
    padding:20px;
}

.panel{
    width:100%;
    max-width:900px;

    padding:35px;

    border:2px solid #00ff88;
    background:#111;
    box-shadow:0 0 20px #00ff88;
}

h1{
    text-align:center;
    margin-bottom:15px;
    font-size:2rem;
}

p{
    margin-bottom:20px;
    color:white;
    line-height:1.7;
}

ul{
    margin-left:25px;
    line-height:2;
}

button{
    padding:15px 35px;
    margin-top:25px;

    background:black;
    color:#00ff88;

    border:1px solid #00ff88;

    font-size:16px;
    font-family:'Share Tech Mono', monospace;

    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00ff88;
    color:black;
}

#result{
    margin-top:30px;
    line-height:2;
    word-break:break-word;
}

.progress{
    margin-top:20px;
    font-size:18px;
}

/* ============================= */
/* Tablet */
/* ============================= */

@media (max-width:768px){

    body{
        padding:15px;
        align-items:flex-start;
    }

    .panel{
        padding:25px;
    }

    h1{
        font-size:1.6rem;
    }

    p,
    li{
        font-size:15px;
    }

    .progress{
        font-size:16px;
    }

    button{
        width:100%;
        padding:14px;
        font-size:15px;
    }

}

/* ============================= */
/* Mobile */
/* ============================= */

@media (max-width:480px){

    body{
        padding:10px;
    }

    .panel{
        padding:18px;
    }

    h1{
        font-size:1.3rem;
    }

    p,
    li{
        font-size:14px;
    }

    ul{
        margin-left:18px;
    }

    .progress{
        font-size:14px;
        line-height:1.8;
    }

    button{
        width:100%;
        padding:12px;
        font-size:14px;
    }

}

</style>

</head>

<body>

<div class="panel">

<h1>DIGITAL EVIDENCE REVIEW</h1>

<p>Available evidence collected during the investigation.</p>

<ul>

<li>✓ Authentication Log</li>

<li>✓ Database Snapshot</li>

<li>✓ Transaction Summary</li>

<li>✓ Audit Trail</li>

</ul>

<button onclick="analyse()">
START ANALYSIS
</button>

<div id="result"></div>

</div>

<script>

function analyse(){

document.getElementById("result").innerHTML=`

<div class="progress">

Analyzing evidence...

<br><br>

████████████████████ 100%

<br><br>

<b>RESULTS</b>

<br><br>

==================================

<br>

✓ Gambling network identified

<br>

✓ Platform records analyzed

<br>

✓ Suspicious operations detected

<br>

✓ Activity timeline reconstructed

<br>

✓ Digital evidence collected

<br>

✓ Final report compiled

<br>

==================================

<br><br>

<b>OPERATION STATUS:</b>

<br>

COMPLETE

<br><br>

<button onclick="window.location.href='database.html'">

CONTINUE TO DATABASE REVIEW →

</button>

</div>

`;

}

</script>

</body>

</html>
