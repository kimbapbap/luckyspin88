<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuckySpin88 - Evidence Analysis</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:#00ff88;
font-family:'Share Tech Mono',monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.panel{
width:900px;
padding:35px;
border:2px solid #00ff88;
background:#111;
box-shadow:0 0 20px #00ff88;
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
margin-bottom:20px;
color:white;
}

ul{
margin-left:25px;
line-height:2;
}

button{

padding:15px 35px;

margin-top:25px;

background:black;

color:#00ff88;

border:1px solid #00ff88;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#00ff88;
color:black;

}

#result{

margin-top:30px;

line-height:2;

}

.progress{

margin-top:20px;

font-size:20px;

}

</style>

</head>

<body>

<div class="panel">

<h1>DIGITAL EVIDENCE REVIEW</h1>

<p>Available evidence collected during the investigation.</p>

<ul>

<li>✓ Authentication Log</li>

<li>✓ Database Snapshot</li>

<li>✓ Transaction Summary</li>

<li>✓ Audit Trail</li>

</ul>

<button onclick="analyse()">

START ANALYSIS

</button>

<div id="result"></div>

</div>

<script>

function analyse(){

document.getElementById("result").innerHTML=`

<div class="progress">

Analyzing evidence...

<br><br>

████████████████████ 100%

<br><br>

<b>RESULTS</b>

<br><br>

✓ Authentication log reviewed

<br>

✓ Multiple failed login attempts identified

<br>

✓ Password policy requires review

<br>

✓ Administrative configuration changes verified

<br>

✓ Audit trail successfully correlated

<br><br>

Evidence analysis completed successfully.

<br><br>

<button onclick="window.location.href='database.html'">

CONTINUE TO DATABASE REVIEW →

</button>

</div>

`;

}

</script>

</body>

</html>
