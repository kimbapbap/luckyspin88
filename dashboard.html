<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LuckySpin88 - Internal Security Console</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050505;
font-family:'Share Tech Mono', monospace;
color:#00ff88;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.panel{

width:950px;

background:#111;

border:2px solid #00ff88;

padding:35px;

box-shadow:0 0 30px #00ff88;

}

h1{

text-align:center;
letter-spacing:3px;

}

h2{

text-align:center;

margin-top:10px;

color:white;

margin-bottom:30px;

font-size:18px;

}

.status{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

margin-bottom:25px;

}

.box{

border:1px solid #00ff88;

padding:15px;

}

.menu{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

margin-bottom:25px;

}

button{

padding:18px;

background:black;

border:1px solid #00ff88;

color:#00ff88;

font-size:17px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#00ff88;

color:black;

}

#terminal{

border:1px solid #00ff88;

padding:20px;

background:black;

height:330px;

overflow:auto;

white-space:pre-line;

line-height:1.8;

}

.continue-btn{

margin-top:25px;
width:100%;

}

</style>

</head>

<body>

<div class="panel">

<h1>LUCKYSPIN88</h1>

<h2>INTERNAL SECURITY CONSOLE</h2>

<div class="status">

<div class="box">
Operator : Guest
</div>

<div class="box">
Access Level : ADMINISTRATOR
</div>

<div class="box">
Environment : Gangseo-gu, Seoul
</div>

<div class="box">
Status : CONNECTED
</div>

</div>

<div class="menu">

<button onclick="overview()">
System Overview
</button>

<button onclick="audit()">
Security Audit
</button>

<button onclick="logs()">
Security Logs
</button>

<button onclick="report()">
Incident Report
</button>

</div>

<div id="terminal">

WELCOME.

Authentication successful.

Select one of the modules above to continue.

</div>

</div>

<script>

function overview(){

document.getElementById("terminal").innerHTML=`

==================================

Authentication         ONLINE

Database Cluster       ONLINE

Firewall               ACTIVE

Backup Server          ONLINE

Storage Usage          67%

CPU Usage              23%

Memory Usage           41%

Network Status         STABLE

`;

}

function audit(){

document.getElementById("terminal").innerHTML=`

SECURITY AUDIT

==================================

✓ TLS Certificate Valid

✓ Firewall Enabled

✓ Multi-Factor Authentication Active

✓ Backup Schedule Verified

⚠ Password Policy Requires Review

⚠ Software Updates Pending

Assessment Complete.

`;

}

function logs(){

document.getElementById("terminal").innerHTML=`

SECURITY LOGS

==================================

08:00  INFO      Web service started

08:03  INFO      Administrator login

08:07  INFO      Backup completed

08:11  WARNING   Multiple failed login attempts detected

==================================

Analyst Note:

Review warning events and verify
whether additional investigation
is required.

<br><br>

<button class="continue-btn" onclick="nextStep()">

CONTINUE INVESTIGATION →

</button>

`;

}

function report(){

document.getElementById("terminal").innerHTML=`

==================================

Risk Level

LOW

• Login outside normal hours

• Large download should be reviewed

Recommendations

• Update password policy

• Install pending updates

• Review administrator permissions

• Continue monitoring

MISSION COMPLETE

`;

}

function nextStep(){

window.location.href="evidence.html";

}

</script>

</body>
</html>
